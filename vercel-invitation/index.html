<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta
      name="description"
      content="Jason & Rhona Mae â€” November 11, 2026. You're invited to celebrate our wedding day."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jason & Rhona Mae Wedding Invitation" />
    <meta
      property="og:description"
      content="Join us on November 11, 2026 for our wedding ceremony and reception."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jason & Rhona Mae Wedding Invitation" />
    <meta
      name="twitter:description"
      content="Join us on November 11, 2026 for our wedding ceremony and reception."
    />
    <title>Jason & Rhona Mae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" href="./photos/photos/background.jpg" as="image" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
      }

      body {
        font-family: "Playfair Display", Georgia, "Times New Roman", serif;
        color: #fff;
        background: #111;
        overflow: hidden;
      }

      .hero-intro {
        --frame-inset: clamp(1.1rem, 4.5vw, 2.35rem);
        --safe-t: max(var(--frame-inset), env(safe-area-inset-top, 0px));
        --safe-r: max(var(--frame-inset), env(safe-area-inset-right, 0px));
        --safe-b: max(var(--frame-inset), env(safe-area-inset-bottom, 0px));
        --safe-l: max(var(--frame-inset), env(safe-area-inset-left, 0px));
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        isolation: isolate;
      }

      .hero-intro__media {
        position: absolute;
        inset: var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0d0d;
        overflow: hidden;
      }

      .hero-intro__photo {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
      }

      .hero-intro__shade {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.16));
        pointer-events: none;
      }

      .hero-intro__frame {
        position: absolute;
        inset: var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);
        border: 1px solid rgba(255, 255, 255, 0.92);
        pointer-events: none;
      }

      .hero-intro__content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.5rem;
        max-width: min(92vw, 520px);
        opacity: 0;
        transform: translateY(10px);
        animation: heroIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
      }

      @keyframes heroIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .hero-intro__monogram {
        margin: 0 0 0.15rem;
        font-family: "Great Vibes", cursive;
        font-size: clamp(4.5rem, 16vw, 7.5rem);
        font-weight: 400;
        line-height: 0.85;
        letter-spacing: 0.02em;
        color: #fff;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.28);
      }

      .hero-intro__names {
        margin: 0 0 0.85rem;
        font-size: clamp(0.72rem, 2.4vw, 0.92rem);
        font-weight: 400;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.96);
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.35);
      }

      .hero-intro__date {
        margin: 0;
        font-size: clamp(0.95rem, 2.8vw, 1.15rem);
        font-weight: 400;
        font-style: italic;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.94);
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.35);
      }

      .hero-intro__enter {
        position: absolute;
        inset: 0;
        z-index: 2;
        border: none;
        padding: 0;
        margin: 0;
        background: transparent;
        cursor: pointer;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
      }

      .hero-intro__enter:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.75);
        outline-offset: -6px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 480px) {
        .hero-intro__names {
          letter-spacing: 0.28em;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero-intro__content {
          opacity: 1;
          transform: none;
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero-intro" aria-label="Wedding invitation">
      <div class="hero-intro__media">
        <img
          class="hero-intro__photo"
          src="./photos/photos/background.jpg"
          alt=""
          width="3300"
          height="2200"
          decoding="async"
          fetchpriority="high"
        />
        <div class="hero-intro__shade" aria-hidden="true"></div>
      </div>
      <div class="hero-intro__frame" aria-hidden="true"></div>

      <div class="hero-intro__content">
        <p class="hero-intro__monogram" aria-hidden="true">The Berbers Wedding</p>
        <h1 class="hero-intro__names">Jason &amp; Rhona Mae</h1>
        <p class="hero-intro__date">11 November 2026</p>
      </div>

      <button type="button" class="hero-intro__enter" id="enter-btn" aria-label="Enter invitation">
        <span class="visually-hidden">Enter invitation</span>
      </button>
    </section>

    <div id="wedding-audio-player" data-turbo-permanent>
      <audio id="wedding-music" loop preload="auto">
        <source src="./audio/ambient.mp3" type="audio/mpeg" />
      </audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/dist/turbo.es2017-umd.min.js"></script>
    <script src="./static-preview.js"></script>
    <script src="./script.js"></script>
    <script>
      (function () {
        const btn = document.getElementById("enter-btn");
        btn?.addEventListener("click", async () => {
          sessionStorage.setItem("wedding-music-was-playing", "1");
          sessionStorage.setItem("wedding-music-muted", "0");
          const audio = document.getElementById("wedding-music");
          if (audio) {
            audio.volume = 0.35;
            try {
              await audio.play();
              sessionStorage.setItem("wedding-music-started", "1");
            } catch {
              // Browser may block until a later gesture; home page will retry.
            }
          }
          const url = new URL("./home.html", location.href);
          url.searchParams.set("intro", "1");
          const invite = (new URLSearchParams(location.search).get("invite") || "").trim();
          if (invite) url.searchParams.set("invite", invite);
          location.href = url.href;
        });
      })();
    </script>
  </body>
</html>
