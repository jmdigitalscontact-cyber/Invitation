<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fbf7f2" />
    <meta
      name="description"
      content="Jason & Rhona Mae â€” November 11, 2026. You're invited to celebrate our wedding day."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jason & Rhona Mae Wedding Invitation" />
    <meta
      property="og:description"
      content="Join us on November 11, 2026 for our wedding ceremony and reception."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jason & Rhona Mae Wedding Invitation" />
    <meta
      name="twitter:description"
      content="Join us on November 11, 2026 for our wedding ceremony and reception."
    />
    <title>Jason & Rhona Mae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./invite-alive.css" />
    <link rel="stylesheet" href="./intro.css" />
    <link rel="preload" href="./photos/photos/photo-main.jpg" as="image" />
  </head>
  <body class="intro-page">
    <div class="invite-bg" aria-hidden="true">
      <div class="intro-ambient">
        <span class="intro-orb intro-orb--1"></span>
        <span class="intro-orb intro-orb--2"></span>
        <span class="intro-orb intro-orb--3"></span>
        <div class="intro-shimmer-lines"></div>
      </div>
      <div class="invite-bg__petals"></div>
      <div class="intro-sparkles"></div>
    </div>

    <main class="intro-shell" aria-label="Wedding invitation">
      <article class="intro-card">
        <div class="intro-card__glow" aria-hidden="true"></div>
        <div class="intro-card__frame-accent" aria-hidden="true"></div>

        <div class="intro-card__photo-wrap">
          <div class="intro-photo-halo" aria-hidden="true"></div>
          <div class="intro-card__photo-frame">
            <img
              class="intro-card__photo"
              src="./photos/photos/photo-main.jpg"
              alt="Jason and Rhona Mae"
              width="280"
              height="373"
              decoding="async"
              fetchpriority="high"
            />
            <span class="intro-photo-shine" aria-hidden="true"></span>
          </div>
        </div>

        <div class="intro-card__body">
          <p class="intro-monogram intro-stagger" data-intro-order="0" aria-hidden="true">
            <span>J</span>
            <span class="intro-monogram__heart" aria-hidden="true">â™¥</span>
            <span>R</span>
          </p>

          <p class="intro-eyebrow intro-stagger" data-intro-order="1">You are cordially invited</p>

          <h1 class="intro-names intro-stagger" data-intro-order="2">
            <span class="intro-names__line">Jason</span>
            <span class="intro-names__amp" aria-hidden="true">&amp;</span>
            <span class="intro-names__line">Rhona Mae</span>
          </h1>

          <div class="intro-divider intro-stagger" data-intro-order="3" aria-hidden="true">
            <span class="intro-divider__line"></span>
            <span class="intro-divider__gem"></span>
            <span class="intro-divider__line"></span>
          </div>

          <p class="intro-date intro-stagger" data-intro-order="4">11 November 2026</p>

          <p class="intro-qr-hint intro-stagger" id="intro-qr-hint" data-intro-order="5" hidden>
            Your personal invitation is ready
          </p>

          <div class="intro-actions intro-stagger" data-intro-order="6">
            <button type="button" class="intro-cta" id="intro-open-btn">
              <span class="intro-cta__shine" aria-hidden="true"></span>
              <span class="intro-cta__text">Open invitation</span>
            </button>
            <p class="intro-music-hint">Music plays throughout your visit â€” tap anywhere if needed</p>
          </div>
        </div>
      </article>
    </main>

    <div id="page-transition-veil" class="page-transition-veil" hidden aria-hidden="true"></div>

    <div id="wedding-audio-player" data-turbo-permanent>
      <audio id="wedding-music" loop preload="auto">
        <source src="./audio/ambient.mp3" type="audio/mpeg" />
      </audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/dist/turbo.es2017-umd.min.js"></script>
    <script src="./invitation-reload.js"></script>
    <script src="./invite-alive.js"></script>
    <script src="./intro.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
